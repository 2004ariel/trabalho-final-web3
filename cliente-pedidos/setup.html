<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurar Totem — Salsicha Lanches</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="hero">
      <div class="container" style="max-width: 460px">
        <svg class="sl-logo mb-3" viewBox="0 0 64 64" role="img" aria-label="Salsicha Lanches" xmlns="http://www.w3.org/2000/svg" style="width:5.5rem;height:5.5rem"><rect x="3" y="3" width="58" height="58" rx="17" fill="#5bbf3a" stroke="#3f9526" stroke-width="3"/><g transform="rotate(-18 32 33)"><rect x="12" y="30" width="40" height="13" rx="6.5" fill="#f2b45f"/><rect x="15" y="27" width="34" height="10" rx="5" fill="#c34a2c"/><rect x="12" y="23" width="40" height="10" rx="5" fill="#f7cf8a"/><path d="M17 28 q4.5 -3.5 9 0 t9 0 t9 0" fill="none" stroke="#ffd23f" stroke-width="2.6" stroke-linecap="round"/></g><circle cx="45" cy="45" r="9.5" fill="#bfeee9" fill-opacity="0.5" stroke="#0f8f88" stroke-width="3"/><line x1="52" y1="52" x2="58" y2="58" stroke="#0f8f88" stroke-width="4" stroke-linecap="round"/></svg>
        <h1 class="brand-logo display-5 mb-2">Configurar Totem</h1>
        <p class="lead text-secondary mb-4">
          Identifique este dispositivo antes de desvendar a fome.
        </p>

        <form id="form-totem" class="text-start" novalidate>
          <div class="mb-3">
            <label for="totem-id" class="form-label">Número do totem</label>
            <input
              type="number"
              min="1"
              id="totem-id"
              class="form-control form-control-lg"
              required
            />
            <div id="erro-id" class="text-danger small mt-1 d-none">
              Informe o número do totem.
            </div>
          </div>

          <div class="mb-4">
            <label for="totem-nome" class="form-label">
              Nome do totem <span class="text-secondary">(opcional)</span>
            </label>
            <input
              type="text"
              id="totem-nome"
              class="form-control form-control-lg"
              placeholder="Ex: Mesa 5, Caixa 2"
            />
          </div>

          <button type="submit" class="btn btn-brand btn-lg w-100">
            Configurar
          </button>
        </form>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <!-- Lógica inline: setup.html NÃO usa js/totem.js (evita loop de redirect). -->
    <script>
      (function () {
        "use strict";

        const form = document.getElementById("form-totem");
        const $id = document.getElementById("totem-id");
        const $nome = document.getElementById("totem-nome");
        const $erro = document.getElementById("erro-id");

        form.addEventListener("submit", function (e) {
          e.preventDefault();

          const id = $id.value.trim();
          if (!id) {
            $erro.classList.remove("d-none");
            $id.focus();
            return;
          }
          $erro.classList.add("d-none");

          localStorage.setItem("totem_id", id);
          localStorage.setItem("totem_nome", $nome.value.trim());
          window.location.href = "index.html";
        });
      })();
    </script>
  </body>
</html>
