<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salsicha Lanches</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="hero">
      <div class="container">
        <svg class="sl-logo" viewBox="0 0 64 64" role="img" aria-label="Salsicha Lanches" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="58" height="58" rx="17" fill="#5bbf3a" stroke="#3f9526" stroke-width="3"/><g transform="rotate(-18 32 33)"><rect x="12" y="30" width="40" height="13" rx="6.5" fill="#f2b45f"/><rect x="15" y="27" width="34" height="10" rx="5" fill="#c34a2c"/><rect x="12" y="23" width="40" height="10" rx="5" fill="#f7cf8a"/><path d="M17 28 q4.5 -3.5 9 0 t9 0 t9 0" fill="none" stroke="#ffd23f" stroke-width="2.6" stroke-linecap="round"/></g><circle cx="45" cy="45" r="9.5" fill="#bfeee9" fill-opacity="0.5" stroke="#0f8f88" stroke-width="3"/><line x1="52" y1="52" x2="58" y2="58" stroke="#0f8f88" stroke-width="4" stroke-linecap="round"/></svg>
        <div class="hero-tag">🐾 Zoinks! Que fome…</div>
        <h1 class="brand-logo display-3 mb-2">
          <span class="sl-word-1">Salsicha</span> <span class="sl-word-2">Lanches</span>
        </h1>
        <p class="lead text-secondary mb-4">
          Lanches que resolvem qualquer mistério da fome.
        </p>
        <a href="produtos.html" class="btn btn-brand btn-lg px-5">
          Começar pedido
        </a>

        <p id="info-totem" class="text-secondary small mt-3"></p>
        <a href="setup.html" class="text-secondary small">Reconfigurar totem</a>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="js/totem.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Sem totem configurado ainda → vai para a tela de setup.
        if (!Totem.isSetup()) {
          window.location.href = "setup.html";
          return;
        }
        document.getElementById("info-totem").textContent = Totem.label();
      });
    </script>
  </body>
</html>
