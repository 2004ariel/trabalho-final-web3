<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cliente Pedidos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="hero">
      <div class="container">
        <div class="brand-emoji mb-3">🍔</div>
        <h1 class="brand-logo display-3 mb-2">Cliente Pedidos</h1>
        <p class="lead text-secondary mb-4">
          Monte seu pedido em poucos toques.
        </p>
        <a href="produtos.html" class="btn btn-brand btn-lg px-5">
          Iniciar
        </a>

        <p id="info-totem" class="text-secondary small mt-3"></p>
        <a href="setup.html" class="text-secondary small">Reconfigurar totem</a>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="js/totem.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Sem totem configurado ainda → vai para a tela de setup.
        if (!Totem.isSetup()) {
          window.location.href = "setup.html";
          return;
        }
        document.getElementById("info-totem").textContent = Totem.label();
      });
    </script>
  </body>
</html>
