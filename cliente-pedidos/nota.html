<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nota do Pedido — Salsicha Lanches</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand sl-navbar shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand brand-logo d-flex align-items-center gap-2" href="index.html">
          <svg class="sl-logo" viewBox="0 0 64 64" role="img" aria-label="Salsicha Lanches" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="58" height="58" rx="17" fill="#5bbf3a" stroke="#3f9526" stroke-width="3"/><g transform="rotate(-18 32 33)"><rect x="12" y="30" width="40" height="13" rx="6.5" fill="#f2b45f"/><rect x="15" y="27" width="34" height="10" rx="5" fill="#c34a2c"/><rect x="12" y="23" width="40" height="10" rx="5" fill="#f7cf8a"/><path d="M17 28 q4.5 -3.5 9 0 t9 0 t9 0" fill="none" stroke="#ffd23f" stroke-width="2.6" stroke-linecap="round"/></g><circle cx="45" cy="45" r="9.5" fill="#bfeee9" fill-opacity="0.5" stroke="#0f8f88" stroke-width="3"/><line x1="52" y1="52" x2="58" y2="58" stroke="#0f8f88" stroke-width="4" stroke-linecap="round"/></svg>
          Salsicha Lanches
        </a>
      </div>
    </nav>

    <main class="container py-4">
      <div class="text-center mb-4">
        <div class="brand-emoji">✅</div>
        <h1 class="h3 mt-2">Pedido confirmado!</h1>
      </div>

      <!-- Sem nota disponível -->
      <div id="vazio" class="text-center text-secondary py-5 d-none">
        <p>Nenhum pedido encontrado.</p>
        <a href="produtos.html" class="btn btn-brand">Fazer um pedido</a>
      </div>

      <!-- Cupom / nota -->
      <div id="nota" class="card shadow-sm nota-paper d-none">
        <div class="card-body">
          <div class="text-center border-bottom pb-2 mb-3">
            <div class="fw-bold">SALSICHA LANCHES</div>
            <div class="small text-secondary">Comprovante de pedido 🐾</div>
          </div>

          <div class="d-flex justify-content-between mb-1">
            <span>Pedido nº</span>
            <span class="fw-bold" id="nota-numero">—</span>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span>Data</span>
            <span id="nota-data">—</span>
          </div>

          <ul class="list-unstyled border-top pt-3" id="nota-itens"></ul>

          <div class="d-flex justify-content-between border-top pt-3 fs-5">
            <span class="fw-bold">TOTAL</span>
            <span class="fw-bold" id="nota-total">R$ 0,00</span>
          </div>
        </div>
      </div>

      <div class="text-center mt-4">
        <button type="button" id="btn-novo" class="btn btn-brand">
          Novo pedido
        </button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="js/totem.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/nota.js"></script>
  </body>
</html>
