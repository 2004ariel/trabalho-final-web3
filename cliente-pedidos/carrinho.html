<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho — Salsicha Lanches</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand sl-navbar shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand brand-logo d-flex align-items-center gap-2" href="produtos.html">
          <svg class="sl-logo" viewBox="0 0 64 64" role="img" aria-label="Salsicha Lanches" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="58" height="58" rx="17" fill="#5bbf3a" stroke="#3f9526" stroke-width="3"/><g transform="rotate(-18 32 33)"><rect x="12" y="30" width="40" height="13" rx="6.5" fill="#f2b45f"/><rect x="15" y="27" width="34" height="10" rx="5" fill="#c34a2c"/><rect x="12" y="23" width="40" height="10" rx="5" fill="#f7cf8a"/><path d="M17 28 q4.5 -3.5 9 0 t9 0 t9 0" fill="none" stroke="#ffd23f" stroke-width="2.6" stroke-linecap="round"/></g><circle cx="45" cy="45" r="9.5" fill="#bfeee9" fill-opacity="0.5" stroke="#0f8f88" stroke-width="3"/><line x1="52" y1="52" x2="58" y2="58" stroke="#0f8f88" stroke-width="4" stroke-linecap="round"/></svg>
          Salsicha Lanches
        </a>
        <a href="produtos.html" class="btn btn-outline-dark btn-sm">
          ← Continuar comprando
        </a>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="h3 mb-4">Seu carrinho</h1>

      <!-- Carrinho vazio -->
      <div id="vazio" class="text-center text-secondary py-5 d-none">
        <div class="brand-emoji mb-3">🛒</div>
        <p>Seu carrinho está vazio.</p>
        <a href="produtos.html" class="btn btn-brand">Ver produtos</a>
      </div>

      <!-- Lista de itens -->
      <div id="conteudo">
        <ul class="list-group mb-4" id="lista-itens"></ul>

        <div class="card shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">
            <span class="fs-5">Total</span>
            <span class="fs-4 fw-bold produto-preco" id="total">R$ 0,00</span>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <button class="btn btn-outline-danger" id="btn-cancelar">
            Cancelar
          </button>
          <button class="btn btn-brand px-4" id="btn-confirmar">
            Confirmar pedido
          </button>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="js/totem.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/carrinho.js"></script>
  </body>
</html>
