<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho — Cliente Pedidos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand brand-logo d-flex align-items-center gap-2" href="produtos.html">
          <span class="brand-emoji">🍔</span> Cliente Pedidos
        </a>
        <a href="produtos.html" class="btn btn-outline-secondary btn-sm">
          ← Continuar comprando
        </a>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="h3 mb-4">Seu carrinho</h1>

      <!-- Carrinho vazio -->
      <div id="vazio" class="text-center text-secondary py-5 d-none">
        <div class="brand-emoji mb-3">🛒</div>
        <p>Seu carrinho está vazio.</p>
        <a href="produtos.html" class="btn btn-brand">Ver produtos</a>
      </div>

      <!-- Lista de itens -->
      <div id="conteudo">
        <ul class="list-group mb-4" id="lista-itens"></ul>

        <div class="card shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">
            <span class="fs-5">Total</span>
            <span class="fs-4 fw-bold produto-preco" id="total">R$ 0,00</span>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <button class="btn btn-outline-danger" id="btn-cancelar">
            Cancelar
          </button>
          <button class="btn btn-brand px-4" id="btn-confirmar">
            Confirmar pedido
          </button>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="js/totem.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/carrinho.js"></script>
  </body>
</html>
